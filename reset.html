<!-- reset.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Set a new password for your Notion account." />
  <title>Reset password — Notion</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem('site-theme');
        if (t !== 'dark' && t !== 'light') {
          t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', t);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="bootstrap.css?v=1" />
  <link rel="stylesheet" href="styles.css?v=14" />
</head>
<body>

  <main class="auth-page">

    <div class="floating-toggles">
      <button class="theme-toggle" type="button" aria-label="Toggle dark mode"></button>
      <button class="lang-toggle" type="button" aria-label="Switch language"></button>
    </div>

    <a href="index.html" class="auth-logo" aria-label="Back to Notion home">
      <span class="nav__logo-mark" aria-hidden="true"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4.459 4.208c.746.606 1.026.56 2.428.466l13.215-.793c.28 0 .047-.28-.046-.326L17.86 1.968c-.42-.326-.981-.7-2.055-.607L3.01 2.295c-.466.046-.56.28-.374.466zm.793 3.08v13.904c0 .747.373 1.027 1.214.98l14.523-.84c.841-.046.935-.56.935-1.167V6.354c0-.606-.233-.933-.748-.887l-15.177.887c-.56.047-.747.327-.747.933zm14.337.745c.093.42 0 .84-.42.888l-.7.14v10.264c-.608.327-1.168.514-1.635.514-.748 0-.935-.234-1.495-.933l-4.577-7.186v6.952L11.31 19s0 .84-1.167.84l-3.222.186c-.093-.187 0-.653.327-.746l.84-.233V9.854L7.822 9.76c-.094-.42.14-1.026.793-1.073l3.456-.233 4.764 7.279v-6.44l-1.215-.14c-.093-.514.28-.887.747-.933zM1.936 1.035l13.31-.98c1.634-.14 2.055-.047 3.082.7l4.249 2.986c.7.513.934.653.934 1.213v16.378c0 1.026-.373 1.634-1.68 1.726l-15.458.934c-.98.047-1.448-.093-1.962-.747l-3.129-4.06c-.56-.747-.793-1.306-.793-1.96V2.667c0-.839.374-1.54 1.447-1.632z"/></svg></span>
      Notion
    </a>

    <div class="auth-card">
      <div class="auth-card__icon" aria-hidden="true">
        <svg class="icon" viewBox="0 0 24 24"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1 class="auth-card__title auth-card__title--centered" data-en="Set a new password" data-kh="កំណត់ពាក្យសម្ងាត់ថ្មី">Set a new password</h1>
      <p class="auth-card__sub auth-card__sub--centered" data-en="Choose a strong password you haven't used before. You'll use it to log in to your workspace." data-kh="ជ្រើសរើសពាក្យសម្ងាត់រឹងមាំ ដែលអ្នកមិនធ្លាប់ប្រើពីមុន។ អ្នកនឹងប្រើវាដើម្បីចូលទៅកន្លែងធ្វើការរបស់អ្នក។">
        Choose a strong password you haven't used before. You'll use it to log in to your workspace.
      </p>

      <form class="auth-form" action="login.html" method="get" novalidate>

        <div class="form-group">
          <label class="label" for="new-password" data-en="New password" data-kh="ពាក្យសម្ងាត់ថ្មី">New password</label>
          <div class="input-wrapper">
            <input
              class="input-field"
              type="password"
              id="new-password"
              name="new-password"
              placeholder="At least 8 characters"
              required
              minlength="8"
              pattern="^(?=.*[A-Za-z])(?=.*\d).{8,}$"
              autocomplete="new-password"
              data-en="At least 8 characters"
              data-kh="យ៉ាងតិច ៨ តួ"
              data-i18n-attr="placeholder"
            />
          </div>
          <!-- Password strength indicator -->
          <div class="password-strength" aria-hidden="true">
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
            <div class="strength-bar"></div>
          </div>
          <p class="strength-label" data-en="Use 8+ characters with letters and numbers" data-kh="ប្រើ ៨ តួឡើងទៅ ដែលមានអក្សរ និងលេខ">Use 8+ characters with letters and numbers</p>
        </div>

        <div class="form-group">
          <label class="label" for="confirm-password" data-en="Confirm new password" data-kh="បញ្ជាក់ពាក្យសម្ងាត់ថ្មី">Confirm new password</label>
          <div class="input-wrapper">
            <input
              class="input-field"
              type="password"
              id="confirm-password"
              name="confirm-password"
              placeholder="Repeat your new password"
              required
              minlength="8"
              autocomplete="new-password"
              data-en="Repeat your new password"
              data-kh="វាយពាក្យសម្ងាត់ថ្មីម្ដងទៀត"
              data-i18n-attr="placeholder"
            />
          </div>
        </div>

        <a href="login.html" class="btn-primary auth-form__submit" data-en="Reset password" data-kh="កំណត់ពាក្យសម្ងាត់ឡើងវិញ">
          Reset password
        </a>

      </form>

      <p class="auth-footer-links auth-footer-links--mt">
        <a href="login.html" class="auth-back-link" data-en="← Back to log in" data-kh="← ត្រឡប់ទៅការចូល">
          ← Back to log in
        </a>
      </p>
    </div>

  </main>

  <script src="i18n.js"></script>
  <script src="theme.js"></script>
</body>
</html>
