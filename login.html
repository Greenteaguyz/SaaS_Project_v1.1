  align-items: center;
  gap: var(--space-md);
  padding: var(--space-md) var(--space-lg);
  margin-bottom: var(--space-xxl);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background:
    radial-gradient(120% 180% at 100% 0%, var(--plan-pro-tint), transparent 60%),
    var(--color-surface);
}
.plan-banner__icon {
  flex-shrink: 0;
  width: 44px;
  height: 44px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-md);
  background-color: var(--plan-pro-tint);
  color: var(--plan-pro-ink);
}
.plan-banner__icon .icon { width: 22px; height: 22px; }
.plan-banner__text { flex: 1; min-width: 0; }
.plan-banner__title {
  font-size: var(--fs-body-md);
  font-weight: 600;
  color: var(--color-text-primary);
}
.plan-banner__sub {
  font-size: var(--fs-caption);
  color: var(--color-text-muted);
  margin-top: 2px;
}
.plan-banner__cta { flex-shrink: 0; white-space: nowrap; }

/* ─── Pro & Team: plan usage panel ─── */
.plan-usage { margin-bottom: var(--space-xxl); }
.plan-usage__head {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  margin-bottom: var(--space-md);
}
.plan-usage__head .dashboard-section-title { margin-bottom: 0; }
.plan-badge--pro  { background-color: var(--plan-pro-tint);  color: var(--plan-pro-ink);  border: 1px solid transparent; }
.plan-badge--team { background-color: var(--plan-team-tint); color: var(--plan-team-ink); border: 1px solid transparent; }

.plan-usage__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-md);
}
.usage-cell {
  padding: var(--space-md) var(--space-lg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background-color: var(--color-surface);
}
.usage-cell__head {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
  margin-bottom: var(--space-sm);
}
.usage-cell__icon {
  width: 32px;
  height: 32px;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-md);
}
.usage-cell__icon .icon { width: 16px; height: 16px; }
.usage-cell__icon--purple { background-color: var(--plan-pro-tint); color: var(--plan-pro-ink); }
.usage-cell__icon--sky    { background-color: rgba(98, 174, 240, 0.14); color: var(--color-accent-sky); }
.usage-cell__icon--green  { background-color: rgba(26, 174, 57, 0.12); color: var(--color-accent-green); }
.usage-cell__label {
  font-size: var(--fs-caption);
  font-weight: 600;
  color: var(--color-text-secondary);
}
.usage-cell__value {
  font-size: var(--fs-h3);
  font-weight: 700;
  line-height: 1.1;
  color: var(--color-text-primary);
  font-variant-numeric: tabular-nums;
}
.usage-cell__unit {
  display: block;
  margin-top: 2px;
  font-size: var(--fs-caption);
  font-weight: 500;
  color: var(--color-text-faint);
}
.usage-cell__foot {
  margin-top: var(--space-xs);
  font-size: var(--fs-caption);
  color: var(--color-text-muted);
}
.usage-spark {
  display: block;
  width: 100%;
  height: 32px;
  margin: var(--space-xs) 0;
  color: var(--color-accent-green);
}

/* Shared meter used by usage cells and team seats */
.plan-meter {
  height: 6px;
  margin: var(--space-xs) 0;
  border-radius: var(--radius-full);
  background-color: var(--color-border);
  overflow: hidden;
}
.plan-meter__fill {
  display: block;
  height: 100%;
  border-radius: inherit;
}
.plan-meter__fill--purple { background-color: var(--plan-pro-ink); }
.plan-meter__fill--sky    { background-color: var(--color-accent-sky); }
.plan-meter__fill--teal   { background-color: var(--plan-team-ink); }

/* ─── Team: collaboration ─── */
.team-collab { margin-bottom: var(--space-xxl); }
.team-collab__grid {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: var(--space-lg);
}
.team-panel {
  padding: var(--space-lg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  background-color: var(--color-surface);
}

.activity-feed { list-style: none; margin: 0; padding: 0; }
.activity-item {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  padding: var(--space-sm) 0;
  border-top: 1px solid var(--color-border);
}
.activity-item:first-child { border-top: none; padding-top: 0; }
.activity-item__avatar {
  flex-shrink: 0;
  width: 30px;
  height: 30px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-full);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
}
.activity-item__text {
  flex: 1;
  min-width: 0;
  margin: 0;
  font-size: var(--fs-caption);
  color: var(--color-text-muted);
}
.activity-item__text strong { color: var(--color-text-primary); font-weight: 600; }
.activity-item__time {
  flex-shrink: 0;
  font-size: var(--fs-eyebrow);
  color: var(--color-text-faint);
  font-variant-numeric: tabular-nums;
}

.seats__count {
  font-size: var(--fs-h2);
  font-weight: 700;
  color: var(--color-text-primary);
  font-variant-numeric: tabular-nums;
}
.seats__count-of {
  font-size: var(--fs-caption);
  font-weight: 500;
  color: var(--color-text-faint);
}
.member-strip { display: flex; margin: var(--space-md) 0; }
.member-strip__avatar {
  width: 34px;
  height: 34px;
  margin-left: -8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-full);
  border: 2px solid var(--color-surface);
  color: #fff;
  font-size: 12px;
  font-weight: 700;
}
.member-strip__avatar:first-child { margin-left: 0; }
.seats__invite { margin-top: var(--space-xs); }

/* ─── Plan demo responsive ─── */
@media (max-width: 900px) {
  .plan-usage__grid { grid-template-columns: 1fr; }
  .team-collab__grid { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  .dash-hero__actions { width: 100%; }
  .plan-switch { align-items: stretch; width: 100%; }
  .plan-switch__track { width: 100%; }
  .plan-switch__btn { flex: 1; }
  .plan-banner { flex-direction: column; align-items: flex-start; }
  .plan-banner__cta { width: 100%; text-align: center; }
}

/* polish.css — "Layered grid clarity" refinements layered on top of styles.css.
   Locks Notion Blue palette; polishes cards, buttons, hero rhythm.
   Preserves Noto Sans Khmer fallback everywhere. */

:root {
  /* English display + body — Khmer kept in the fallback chain so
     html[lang="km"] body rules still resolve glyphs cleanly. */
  --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI',
                 'Noto Sans Khmer', Helvetica, Arial, sans-serif;
  --font-display: 'Inter Tight', 'Inter', 'Noto Sans Khmer',
                  -apple-system, system-ui, sans-serif;

  /* Hairline borders and softer, layered shadows */
  --color-border: #e5e5e5;
  --shadow-card:
    0 1px 2px rgba(15, 23, 42, 0.04),
    0 0 0 1px rgba(15, 23, 42, 0.04);
  --shadow-elevated:
    0 10px 30px -12px rgba(15, 23, 42, 0.12),
    0 0 0 1px rgba(15, 23, 42, 0.05);
  --shadow-nav: 0 1px 0 rgba(15, 23, 42, 0.06);

  /* Slightly rounder cards for the layered feel */
  --radius-card: 12px;
}

html[data-theme="dark"] {
  --color-border: #262626;
  --shadow-card:
    0 1px 2px rgba(0, 0, 0, 0.4),
    0 0 0 1px rgba(255, 255, 255, 0.04);
  --shadow-elevated:
    0 10px 30px -12px rgba(0, 0, 0, 0.6),
    0 0 0 1px rgba(255, 255, 255, 0.05);
}

/* Card lift on hover — restrained, matches "Layered grid clarity" */
.card,
.feature-card,
.pricing-card {
  transition: box-shadow 220ms ease, transform 220ms ease,
              border-color 220ms ease;
}
.card:hover,
.feature-card:hover,
.pricing-card:hover {
  box-shadow: var(--shadow-elevated);
  transform: translateY(-2px);
}

/* Primary CTA — crisper hover, subtle shadow */
.btn-primary {
  box-shadow: 0 1px 2px rgba(0, 117, 222, 0.20);
  transition: background-color 160ms ease, box-shadow 200ms ease,
              transform 160ms ease;
}
.btn-primary:hover {
  box-shadow: 0 6px 18px -6px rgba(0, 117, 222, 0.45);
  transform: translateY(-1px);
}
.btn-primary:active {
  transform: translateY(0);
}

/* Secondary / ghost buttons — hairline border, subtle */
.btn-secondary,
.btn-ghost {
  transition: background-color 160ms ease, border-color 160ms ease;
}

/* Nav polish */
.nav,
.site-nav {
  backdrop-filter: saturate(140%) blur(8px);
  -webkit-backdrop-filter: saturate(140%) blur(8px);
}

/* Hero body copy — full white for readability on the dark hero */
.hero-band p,
.hero p {
  color: #ffffff !important;
}

/* Italicize the gradient headline phrase */
.hero-band__headline--gradient {
  font-style: italic;
}


/* Section rhythm — a little more breathing room between bands */
section + section {
  margin-top: 0;
}

/* Respect reduced motion */
@media (prefers-reduced-motion: reduce) {
  .card,
  .feature-card,
  .pricing-card,
  .btn-primary {
    transition: none;
  }
  .card:hover,
  .feature-card:hover,
  .pricing-card:hover,
  .btn-primary:hover {
    transform: none;
  }
}

/* ---------------------------------------------------------------
   Contrast safeguards — ensure text meets WCAG AA in BOTH themes.
   Layered overrides only; no HTML changes.
   --------------------------------------------------------------- */

/* Dark-mode primary button: white on #4a9eff fails AA (2.75:1).
   Use ink text on the lighter blue for a crisp, accessible contrast. */
html[data-theme="dark"] .btn-primary {
  background-color: #4a9eff;
  color: #0b1220;
}
html[data-theme="dark"] .btn-primary:hover {
  background-color: #6bb1ff;
  color: #0b1220;
}

/* Ghost / secondary buttons in dark mode — keep readable on tinted bg */
html[data-theme="dark"] .btn-ghost,
html[data-theme="dark"] .btn-secondary {
  color: var(--color-text-primary);
}

/* Plan badges: tinted-on-tint fails contrast. Deepen text in light mode
   and lift it in dark mode so both PRO/TEAM chips stay legible. */
.plan-badge--pro { color: #4b2ea3; }
.plan-badge--team { color: #14615e; }
html[data-theme="dark"] .plan-badge--pro { color: #c9b6ff; }
html[data-theme="dark"] .plan-badge--team { color: #7fd3cf; }

/* Section links on tinted pill backgrounds — deepen text a touch */
.dash-section-link { color: var(--color-primary-active); }
html[data-theme="dark"] .dash-section-link { color: #8ec5ff; }

/* Hero mockup meta text on the dark slab — lift from 0.55/0.75 to safer levels */
.hero-mockup__tag { color: rgba(255, 255, 255, 0.72) !important; }
.hero-mockup__label { color: rgba(255, 255, 255, 0.92) !important; }
.hero-mockup__title { color: #ffffff !important; }

/* Avatar circles: bump text weight so 3-4:1 chip colors stay readable
   (WCAG treats bold ≥14pt as large text with 3:1 minimum). */
.activity-item__avatar,
.member-strip__avatar {
  font-weight: 700;
}

/* Faint text guard — never dip below AA on either surface */
html:not([data-theme="dark"]) {
  --color-text-faint: #605c56;
}
html[data-theme="dark"] {
  --color-text-faint: #b8b2aa;
}



/* Bootstrap's .text-muted (rgba(33,37,41,.75)) overrides ours and becomes
   invisible in dark mode. Force our token everywhere. */
body .text-muted,
body p.text-muted,
body span.text-muted,
body div.text-muted {
  color: var(--color-text-muted) !important;
}

/* Popular pill on primary bg — white on #4a9eff fails in dark mode */
html[data-theme="dark"] .badge--popular,
html[data-theme="dark"] .quick-chip--primary,
html[data-theme="dark"] .quick-chip--primary * {
  color: #0b1220 !important;
}

/* Light-mode tint badges — deepen text for AA */
.badge--green { color: #128a2c !important; }
.badge--teal  { color: #1a726f !important; }
.badge--nav.badge--teal { color: #0f5754 !important; }
html[data-theme="dark"] .badge--teal { color: #7fd3cf !important; }
html[data-theme="dark"] .badge--green { color: #7fe19b !important; }

/* Sidebar active + upgrade — deepen blue text over blue tint */
.sidebar__link--active,
.sidebar__link--active *,
.sidebar__upgrade,
.sidebar__upgrade * {
  color: var(--color-primary-active) !important;
}
html[data-theme="dark"] .sidebar__link--active,
html[data-theme="dark"] .sidebar__link--active *,
html[data-theme="dark"] .sidebar__upgrade,
html[data-theme="dark"] .sidebar__upgrade * {
  color: #a9ceff !important;
}

/* Team seats caption — teal on light gray was 3.6 */
.seats__caption,
[class*="seats__"] .text-muted {
  color: var(--color-text-secondary) !important;
}

/* Sidebar user-plan captions — teal at 3.6 on gray, deepen */
.sidebar__user-plan,
.sidebar__user-plan * {
  color: var(--color-text-secondary) !important;
}



/* Empty-state CTA link — deepen for AA */
.empty-cta { color: var(--color-primary-active) !important; }
html[data-theme="dark"] .empty-cta { color: #a9ceff !important; }

/* Avatar chips — force dark ink in BOTH themes so any tile hue meets AA */
.activity-item__avatar,
.member-strip__avatar,
.topbar__avatar,
html[data-theme="dark"] .activity-item__avatar,
html[data-theme="dark"] .member-strip__avatar,
html[data-theme="dark"] .topbar__avatar {
  color: #0b1220 !important;
  font-weight: 700;
}

/* Purple avatar override — deepened bg + white text (higher specificity
   so it wins over the generic ink rule above) */
html .member-strip__avatar[style*="6d4bd1"],
html .activity-item__avatar[style*="6d4bd1"] {
  background: #4b2ea3 !important;
  color: #ffffff !important;
}




/* Pricing card featured (dark slab in light mode) — muted price suffix
   was inheriting light-mode #615d59 on a near-black bg. */
.pricing-card--featured .pricing-card__price small,
.pricing-card--featured .pricing-card__price span {
  color: rgba(255, 255, 255, 0.75);
}

/* ---------------------------------------------------------------
   A11y + polish pass (landing /) — polish.css only, no HTML/JS edits
   --------------------------------------------------------------- */

/* Focus-visible: consistent, high-contrast ring across interactive elements.
   Keeps mouse-click focus quiet, only shows on keyboard navigation. */
a:focus-visible,
button:focus-visible,
.btn:focus-visible,
.btn-primary:focus-visible,
.btn-secondary:focus-visible,
.btn-ghost:focus-visible,
.card:focus-visible,
.feature-card:focus-visible,
.pricing-card:focus-visible,
input:focus-visible,
textarea:focus-visible,
select:focus-visible {
  outline: 2px solid var(--color-primary, #0075de);
  outline-offset: 2px;
  border-radius: 6px;
}
html[data-theme="dark"] a:focus-visible,
html[data-theme="dark"] button:focus-visible,
html[data-theme="dark"] .btn:focus-visible {
  outline-color: #8ec5ff;
}

/* Mobile tap targets — bump primary CTAs and nav controls to ≥44px.
   Scoped to ≤640px so desktop density is unchanged. */
@media (max-width: 640px) {
  .btn,
  .btn-primary,
  .btn-secondary,
  .btn-ghost,
  .btn-utility,
  .hero .btn,
  .hero-band .btn,
  a.btn,
  button.btn,
  a.btn-utility {
    min-height: 44px !important;
    padding-top: 12px !important;
    padding-bottom: 12px !important;
  }

  /* Header controls (theme toggle, lang switcher) */
  .nav button,
  .site-nav button,
  .topbar button,
  .lang-switch,
  .theme-toggle {
    min-height: 44px;
    min-width: 44px;
  }
  /* "Talk to sales →" style inline links after CTAs — give them room */
  .hero a[href*="contact"],
  .hero-band a[href*="contact"] {
    min-height: 44px;
    display: inline-flex;
    align-items: center;
  }
}

/* Unify hairline border color across all card grids so features/pricing/
   testimonials read as one system. Uses the token so themes still swap. */
.card,
.feature-card,
.pricing-card,
.testimonial-card {
  border-color: var(--color-border);
}

/* Pricing "popular" card — cleaner emphasis via a subtle ring instead of
   piling more shadow onto it. */
.pricing-card--popular,
.pricing-card--featured {
  box-shadow:
    0 0 0 1px var(--color-primary, #0075de),
    0 10px 30px -14px rgba(0, 117, 222, 0.28);
}
html[data-theme="dark"] .pricing-card--popular,
html[data-theme="dark"] .pricing-card--featured {
  box-shadow:
    0 0 0 1px #4a9eff,
    0 10px 30px -14px rgba(74, 158, 255, 0.35);
}

/* Logo strip — slightly more breathing room, keep grayscale treatment */
.logo-strip,
.logos {
  row-gap: 16px;
  column-gap: 28px;
}

/* Secondary/ghost button border in dark mode — was too faint to read as
   a button boundary against the near-black surface. */
html[data-theme="dark"] .btn-secondary,
html[data-theme="dark"] .btn-ghost {
  border-color: rgba(255, 255, 255, 0.16);
}
html[data-theme="dark"] .btn-secondary:hover,
html[data-theme="dark"] .btn-ghost:hover {
  border-color: rgba(255, 255, 255, 0.28);
  background-color: rgba(255, 255, 255, 0.04);
}


/* ---------------------------------------------------------------
   Structural minimalist pass — additive polish on top of everything
   above. Tightens rhythm on landing + dashboard. No HTML/JS changes.
   --------------------------------------------------------------- */

/* Slightly softer surface tokens for a calmer canvas */
:root {
  --radius-card: 14px;
  --color-border: #ececec;
}
html[data-theme="dark"] {
  --color-border: #23262c;
}

/* Cards: hairline border, quieter default, cleaner hover */
.card,
.feature-card,
.pricing-card,
.testimonial-card,
.dash-card,
.kpi-card,
.stat-card {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-card);
  box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
  transition: box-shadow 220ms ease, transform 220ms ease,
              border-color 220ms ease;
}
.card:hover,
.feature-card:hover,
.pricing-card:hover,
.testimonial-card:hover,
.dash-card:hover,
.kpi-card:hover,
.stat-card:hover {
  border-color: color-mix(in oklab, var(--color-primary, #0075de) 22%, var(--color-border));
  box-shadow:
    0 1px 2px rgba(15, 23, 42, 0.04),
    0 12px 32px -18px rgba(15, 23, 42, 0.18);
}
html[data-theme="dark"] .card:hover,
html[data-theme="dark"] .feature-card:hover,
html[data-theme="dark"] .pricing-card:hover,
html[data-theme="dark"] .testimonial-card:hover,
html[data-theme="dark"] .dash-card:hover,
html[data-theme="dark"] .kpi-card:hover,
html[data-theme="dark"] .stat-card:hover {
  border-color: color-mix(in oklab, #4a9eff 32%, var(--color-border));
  box-shadow:
    0 1px 2px rgba(0, 0, 0, 0.4),
    0 14px 34px -16px rgba(0, 0, 0, 0.55);
}

/* ── Features + Free/Team pricing: consistent 1px hairline @ ~15% ──
   Border stays subtle across default / hover / focus / active states.
   Focus emphasis is carried by the outline ring, not by thickening the border. */
#features .feature-card,
.pricing-card:not(.pricing-card--featured):not(.pricing-card--popular) {
  border-width: 1px;
  border-style: solid;
  border-color: rgba(0, 0, 0, 0.15);
  transition: border-color 180ms ease, box-shadow 220ms ease, transform 220ms ease;
}
#features .feature-card:hover,
.pricing-card:not(.pricing-card--featured):not(.pricing-card--popular):hover {
  border-color: color-mix(in oklab, var(--color-primary, #0075de) 22%, rgba(0, 0, 0, 0.15));
}
#features .feature-card:focus-visible,
.pricing-card:not(.pricing-card--featured):not(.pricing-card--popular):focus-visible {
  border-color: color-mix(in oklab, var(--color-primary, #0075de) 22%, rgba(0, 0, 0, 0.15));
}
#features .feature-card:active,
.pricing-card:not(.pricing-card--featured):not(.pricing-card--popular):active {
  border-color: rgba(0, 0, 0, 0.18);
}

html[data-theme="dark"] #features .feature-card,
html[data-theme="dark"] .pricing-card:not(.pricing-card--featured):not(.pricing-card--popular) {
  border-color: rgba(255, 255, 255, 0.15);
}
html[data-theme="dark"] #features .feature-card:hover,
html[data-theme="dark"] .pricing-card:not(.pricing-card--featured):not(.pricing-card--popular):hover,
html[data-theme="dark"] #features .feature-card:focus-visible,
html[data-theme="dark"] .pricing-card:not(.pricing-card--featured):not(.pricing-card--popular):focus-visible {
  border-color: color-mix(in oklab, #4a9eff 32%, rgba(255, 255, 255, 0.15));
}
html[data-theme="dark"] #features .feature-card:active,
html[data-theme="dark"] .pricing-card:not(.pricing-card--featured):not(.pricing-card--popular):active {
  border-color: rgba(255, 255, 255, 0.20);
}

/* Blue glow behind #features bento cards on hover/focus — additive,
   preserves the 1px hairline (delivered via border-color rules above). */
#features .feature-card:hover,
#features .feature-card:focus-visible,
.pricing-card:not(.pricing-card--featured):not(.pricing-card--popular):hover,
.pricing-card:not(.pricing-card--featured):not(.pricing-card--popular):focus-visible {
  box-shadow:
    0 0 0 1px color-mix(in oklab, var(--color-primary, #0075de) 20%, transparent),
    0 12px 28px -10px color-mix(in oklab, var(--color-primary, #0075de) 45%, transparent),
    0 4px 14px -6px rgba(15, 23, 42, 0.10);
}
html[data-theme="dark"] #features .feature-card:hover,
html[data-theme="dark"] #features .feature-card:focus-visible,

}



/* Section heading rhythm — a touch tighter, letter-spacing crisp */
h1, h2, h3 {
  letter-spacing: -0.015em;
}
h1 { letter-spacing: -0.025em; }

/* Tables: minimal frame, uppercase micro headers */
table thead th {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--color-text-muted, #6b7280);
}
table tbody tr {
  transition: background-color 140ms ease;
}
table tbody tr:hover {
  background-color: color-mix(in oklab, var(--color-primary, #0075de) 5%, transparent);
}

/* Primary CTA — refined gradient sheen, keeps AA in both themes */
.btn-primary {
  background-image: linear-gradient(180deg,
    color-mix(in oklab, var(--color-primary, #0075de) 92%, white) 0%,
    var(--color-primary, #0075de) 100%);
}
html[data-theme="dark"] .btn-primary {
  background-image: linear-gradient(180deg, #6bb1ff 0%, #4a9eff 100%);
}

/* Dashboard sidebar — hairline right border, quiet hover states */
.sidebar,
.dash-sidebar {
  border-right: 1px solid var(--color-border);
}
.sidebar__link:hover,
.dash-sidebar a:hover {
  background-color: color-mix(in oklab, var(--color-primary, #0075de) 6%, transparent);
  border-radius: 8px;
}

/* Dashboard topbar — hairline bottom, faint blur */
.topbar,
.dash-topbar {
  border-bottom: 1px solid var(--color-border);
  backdrop-filter: saturate(140%) blur(8px);
  -webkit-backdrop-filter: saturate(140%) blur(8px);
}

/* Reduced motion — respect */
@media (prefers-reduced-motion: reduce) {
  .card, .feature-card, .pricing-card, .dash-card,
  .kpi-card, .stat-card, .testimonial-card, table tbody tr {
    transition: none;
  }
  .card:hover, .feature-card:hover, .pricing-card:hover,
  .dash-card:hover, .kpi-card:hover, .stat-card:hover {
    transform: none;
  }
}


/* ---------------------------------------------------------------
   Hero mockup — macOS window with Name/Status/Timeline table.
   Scoped to .hero-mockup__card; outer float/animation unchanged.
   --------------------------------------------------------------- */
.hero-mockup__card {
  padding: 0 !important;
  overflow: hidden;
  background: #0f1115 !important;
  border: 1px solid rgba(255,255,255,0.08) !important;
}

  display: grid;

}

.hero-mockup__traffic--spacer { visibility: hidden; }

.hero-mockup__table {

.hero-mockup__th {
  font-size: 10px;
  letter-spacing: 0.14em;

/* ============================================================
   Cross-page animation polish (additive)
   - Reuse existing keyframes: twinkle, float, gradient-shift
   - Faint stars behind auth cards, dashboard greeting, contact,
     404. Auth cards get a slow float. Gradient headline classes
     get the ambient hue shift.
   ============================================================ */

/* Ensure host sections are positioning contexts and content sits
   above the decorative stars layer. */
.auth-page,
.dash-hero,
.contact-section { position: relative; }

.auth-page > *:not(.hero-stars):not(.floating-toggles),
.dash-hero > *:not(.hero-stars):not(.floating-toggles),
.contact-section > *:not(.hero-stars):not(.floating-toggles) { position: relative; z-index: 1; }

/* Subtle hairline edge on the auth card */
.auth-card {
  border: 1px solid rgba(15, 23, 42, 0.18) !important;
}
[data-theme="dark"] .auth-card {
  border: 1px solid rgba(255, 255, 255, 0.15) !important;
}

/* Soft variant of the star field — full coverage, faint, non-interactive */
.hero-stars--soft {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 0.35;
  overflow: hidden;
}
[data-theme="dark"] .hero-stars--soft { opacity: 0.45; }

/* Slow float for auth cards (calmer than the hero mockup) */
.auth-card.is-floating {
  animation: float 7s ease-in-out infinite;
  will-change: transform;
}

/* Ambient gradient shift on any gradient headline span across pages */
.hero-band__headline--gradient,
.text-gradient,
.gradient-text {
  animation: gradient-shift 8s ease-in-out infinite;
}

@media (prefers-reduced-motion: reduce) {
  .auth-card.is-floating,
  .hero-band__headline--gradient,
  .text-gradient,
  .gradient-text,
  .hero-stars--soft .hero-star { animation: none !important; }
}

/* ─────────────────────────────────────────────────────────────
   Solutions cards — enhanced entrance + hover motion
   Builds on the existing .reveal scroll-in with a scoped lift,
   soft primary-tinted glow, and subtle icon pop. Reduced-motion
   users get the static hover treatment only.
   ───────────────────────────────────────────────────────────── */
@media (prefers-reduced-motion: no-preference) {
  #solutions .solution-card {
    transition:
      transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
      box-shadow 0.35s ease,
      border-color 0.25s ease;
    will-change: transform;
  }
  #solutions .solution-card:hover {
    transform: translateY(-6px);
    border-color: color-mix(in oklab, var(--color-primary) 35%, var(--color-border));
  }
  #solutions .solution-card:active {
    transform: translateY(-2px);
    transition-duration: 0.12s;
  }
  #solutions .solution-card .solution-card__icon {
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }
  #solutions .solution-card:hover .solution-card__icon {
    transform: translateY(-2px) scale(1.06) rotate(-2deg);
  }
}

/* Light-mode glow — denser so it reads clearly on pale surfaces */
#solutions .solution-card:hover,
#solutions .solution-card:focus-visible {
  box-shadow:
    0 0 0 1px color-mix(in oklab, var(--color-primary, #0075de) 30%, transparent),
    0 12px 28px -10px color-mix(in oklab, var(--color-primary, #0075de) 60%, transparent),
    0 4px 14px -6px rgba(15, 23, 42, 0.15);
}

html[data-theme="dark"] #solutions .solution-card:hover,
html[data-theme="dark"] #solutions .solution-card:focus-visible {
  box-shadow:
    0 0 0 1px color-mix(in oklab, #4a9eff 32%, transparent),
    0 14px 34px -10px color-mix(in oklab, #4a9eff 55%, transparent),
    0 4px 16px -6px rgba(0, 0, 0, 0.55);
}

/* Showcase — reuse hero mac window chrome around dashboard image */
.showcase__window {
  width: 100%;
  transform: none !important;
  margin: 0 !important;
}
.showcase__window .showcase__img {
  display: block;
  width: 100%;
  height: auto;
  border-radius: 0 0 12px 12px;
  border-top: 1px solid rgba(255, 255, 255, 0.06);
}

/* Keyboard focus — solid, high-contrast outline on top of the glow so
   tab-navigation is unmistakable and never obscured by the box-shadow. */
#solutions .solution-card {
  outline: 0;
}
#solutions .solution-card:focus { outline: 0; }
#solutions .solution-card:focus-visible {

  outline-offset: 3px;

}
html[data-theme="dark"] #solutions .solution-card:focus-visible {
  outline-color: #4a9eff;
}

<script>/* i18n.js — lightweight EN / KH language switcher
   ----------------------------------------------------------------
   - Reads the saved language from localStorage (default: "en")
   - Swaps visible text on any element carrying data-en / data-kh
     (use data-i18n-attr="placeholder" to translate an attribute
      instead of the element's text)
   - Renders a flag button (.lang-toggle) showing the CURRENT language
   - Persists the choice so it carries across every page
   ---------------------------------------------------------------- */
(function () {
  'use strict';

  var STORAGE_KEY = 'site-lang';
  var DEFAULT_LANG = 'en';
  var LANGS = ['en', 'kh'];

  // Two-letter labels shown on the toggle button
  var LABELS = { en: 'EN', kh: 'KH' };

  // Full names used for accessible labels
  var NAMES = { en: 'English', kh: 'ខ្មែរ (Khmer)' };

  // Inline SVG flags (2:1) — drawn so they render on every OS,
  // unlike flag emoji which Windows shows as plain letters.
  var FLAGS = {
    // United Kingdom — simplified Union Jack
    en:
      '<svg class="flag-svg" viewBox="0 0 60 30" aria-hidden="true" focusable="false">' +
        '<rect width="60" height="30" fill="#012169"/>' +
        '<path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/>' +
        '<path d="M0,0 L60,30 M60,0 L0,30" stroke="#c8102e" stroke-width="4"/>' +
        '<rect x="25" width="10" height="30" fill="#fff"/>' +
        '<rect y="10" width="60" height="10" fill="#fff"/>' +
        '<rect x="27" width="6" height="30" fill="#c8102e"/>' +
        '<rect y="12" width="60" height="6" fill="#c8102e"/>' +
      '</svg>',
    // Cambodia — blue/red/blue bands with simplified Angkor Wat
    kh:
      '<svg class="flag-svg" viewBox="0 0 60 30" aria-hidden="true" focusable="false">' +
        '<rect width="60" height="30" fill="#032ea1"/>' +
        '<rect y="7.5" width="60" height="15" fill="#e00025"/>' +
        '<g fill="#fff">' +
          '<rect x="29.1" y="11" width="1.8" height="8"/>' +
          '<rect x="24" y="13" width="1.4" height="6"/>' +
          '<rect x="34.6" y="13" width="1.4" height="6"/>' +
          '<rect x="22" y="18" width="16" height="1.6"/>' +
          '<polygon points="30,8.8 28.5,11 31.5,11"/>' +
          '<polygon points="24.7,11.4 23.7,13 25.7,13"/>' +
          '<polygon points="35.3,11.4 34.3,13 36.3,13"/>' +
        '</g>' +
      '</svg>'
  };

  function safeGet() {
    try { return localStorage.getItem(STORAGE_KEY); } catch (e) { return null; }
  }

  function safeSet(lang) {
    try { localStorage.setItem(STORAGE_KEY, lang); } catch (e) { /* ignore */ }
  }

  function getLang() {
    var saved = safeGet();
    return LANGS.indexOf(saved) !== -1 ? saved : DEFAULT_LANG;
  }

  function translate(lang) {
    var nodes = document.querySelectorAll('[data-en], [data-kh]');
    for (var i = 0; i < nodes.length; i++) {
      var el = nodes[i];
      var value = el.getAttribute('data-' + lang);
      if (value === null) continue;
      var attr = el.getAttribute('data-i18n-attr');
      if (attr) {
        el.setAttribute(attr, value);
      } else {
        el.textContent = value;
      }
    }
  }

  function renderToggles(lang) {
    var next = lang === 'en' ? 'kh' : 'en';
    var buttons = document.querySelectorAll('.lang-toggle');
    for (var i = 0; i < buttons.length; i++) {
      var btn = buttons[i];
      btn.innerHTML =
        '<span class="lang-toggle__flag">' + FLAGS[lang] + '</span>' +
        '<span class="lang-toggle__label">' + LABELS[lang] + '</span>';
      btn.setAttribute('aria-label',
        'Language: ' + NAMES[lang] + '. Switch to ' + NAMES[next]);
      btn.setAttribute('title', 'Switch to ' + NAMES[next]);
    }
  }

  function apply(lang) {
    document.documentElement.lang = (lang === 'kh') ? 'km' : 'en';
    translate(lang);
    renderToggles(lang);
  }

  function toggle() {
    var next = getLang() === 'en' ? 'kh' : 'en';
    safeSet(next);
    apply(next);
  }

  function init() {
    apply(getLang());
    document.addEventListener('click', function (e) {
      var btn = e.target.closest ? e.target.closest('.lang-toggle') : null;
      if (btn) {
        e.preventDefault();
        toggle();
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
<script>/* theme.js — light / dark mode toggle
   ----------------------------------------------------------------
   - Sets data-theme="light|dark" on <html>
   - Persists the choice in localStorage ("site-theme")
   - Falls back to the OS color-scheme preference on first visit
   - Renders any .theme-toggle button with a sun/moon icon
   ---------------------------------------------------------------- */
(function () {
  'use strict';

  var STORAGE_KEY = 'site-theme';

  // Icons show the state you'd switch TO: moon while light, sun while dark.
  var MOON =
    '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true">' +
      '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>' +
    '</svg>';
  var SUN =
    '<svg class="icon" viewBox="0 0 24 24" aria-hidden="true">' +
      '<circle cx="12" cy="12" r="4"/>' +
      '<path d="M12 2v2"/><path d="M12 20v2"/>' +
      '<path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/>' +
      '<path d="M2 12h2"/><path d="M20 12h2"/>' +
      '<path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>' +
    '</svg>';

  function stored() {
    try { return localStorage.getItem(STORAGE_KEY); } catch (e) { return null; }
  }

  function save(theme) {
    try { localStorage.setItem(STORAGE_KEY, theme); } catch (e) { /* ignore */ }
  }

  function initial() {
    var s = stored();
    if (s === 'dark' || s === 'light') return s;
    if (window.matchMedia &&
        window.matchMedia('(prefers-color-scheme: dark)').matches) {
      return 'dark';
    }
    return 'light';
  }

  function render(theme) {
    var next = theme === 'dark' ? 'light' : 'dark';
    var buttons = document.querySelectorAll('.theme-toggle');
    for (var i = 0; i < buttons.length; i++) {
      var btn = buttons[i];
      btn.innerHTML = theme === 'dark' ? SUN : MOON;
      btn.setAttribute('aria-label', 'Switch to ' + next + ' mode');
      btn.setAttribute('title', 'Switch to ' + next + ' mode');
    }
  }

  function apply(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    // Keep Bootstrap's dark mode (data-bs-theme) in sync with the site theme.
    document.documentElement.setAttribute('data-bs-theme', theme);
    render(theme);
  }

  function toggle() {
    var next = (document.documentElement.getAttribute('data-theme') === 'dark')
      ? 'light' : 'dark';
    save(next);
    apply(next);
  }

  function init() {
    apply(initial());
    document.addEventListener('click', function (e) {
      var btn = e.target.closest ? e.target.closest('.theme-toggle') : null;
      if (btn) {
        e.preventDefault();
        toggle();
      }
    });
  }

  // Apply the stored/initial theme immediately to minimise flash.
  var startTheme = initial();
  document.documentElement.setAttribute('data-theme', startTheme);
  document.documentElement.setAttribute('data-bs-theme', startTheme);

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
<script>/* forms.js — auth/contact form submit handling (prototype, no backend)
   ----------------------------------------------------------------
   The auth and contact forms are real <form action="…" method="get">
   elements whose submit control is a <button type="submit">. Native
   HTML validation (required / pattern / minlength) runs on submit
   because the forms no longer carry `novalidate`, so invalid input is
   blocked with the browser's own messages and Enter-to-submit works.

   On a VALID submit we intercept and navigate to the form's `action`
   ourselves. This keeps the prototype's page-to-page flow intact while
   avoiding a real GET submission, which would otherwise append the
   field values (including the password) to the URL — credentials in
   the address bar / history. No values are ever serialized.

   Degrades safely: with JS disabled the form still submits natively to
   its `action` page, so navigation is never lost.
   ---------------------------------------------------------------- */
(function () {
  'use strict';

  function onSubmit(e) {
    var form = e.currentTarget;
    // Always stop the native GET submission first, so field values can
    // never be serialized into the URL (credentials in the address bar /
    // history) even if constraint validation behaves oddly in some engine.
    e.preventDefault();
    // Show the browser's native validation messages and block navigation
    // while the form is invalid.
    if (typeof form.reportValidity === 'function' && !form.reportValidity()) {
      return;
    }
    var action = form.getAttribute('action');
    if (action) {
      window.location.assign(action);
    }
  }

  var forms = document.querySelectorAll('form.auth-form');
  for (var i = 0; i < forms.length; i++) {
    forms[i].addEventListener('submit', onSubmit);
  }
})();
</script>
